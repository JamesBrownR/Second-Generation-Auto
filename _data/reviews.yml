reviews:
  - reviewer: Mariela Diaz
    date: 5 months ago
    rating: 5
    text: |
      I had an outstanding experience with the owner Tony, from Second Generation Auto Llc. From the start, the owner showed incredible honesty—he even tried to discourage me, explaining that the work required would cost more than the car was worth, and he even recommended other shops. However, we were looking for true quality craftsmanship, as my nephew used to teach car restoration and is extremely detail oriented. That level of integrity from the owner immediately gave me confidence in their approach.
      The restoration was nothing short of extraordinary. My sister‑in‑law and I took on this project as a Christmas gift for her son, my nephew, and the final results completely exceeded our expectations. The craftsmanship, attention to detail, and pride put into every inch of the car were evident the moment we saw it. It looked better than we ever imagined—truly showroom‑worthy. This team exceeded every expectation and delivered a gift our family will never forget.
      Watching my nephew’s reaction was truly unforgettable—his eyes widened in disbelief, and for a moment, he was completely speechless. When he realized the car before him was his, beautifully restored beyond anything he could have imagined, tears welled up in his eyes. The look of pure astonishment and joy on his face made every effort worthwhile. I am deeply grateful to this team for making such a powerful and emotional moment possible. My nephew never expected to see his car transformed so perfectly, and his heartfelt response is something his mother and will always remember. And delivered as promised in time for Christmas!
      If you’re looking for a shop that combines honesty with top tier craftsmanship, this is the place to go. I highly recommend them!
      Thank you Tony! I asked my nephew to also write a review for the actual work done as he will be able to explain better about the quality of your work.
    services: Painting, Body & Trim 

 - reviewer: Solano323
    date: 2 years ago
    rating: 5
    text: |
      I am so glad to have done my research and found this shop!!!
      Tony is an amazing person and the work his team did for my cars was amazing!!!!
      Tony and the team went above and beyond on both my cars, stayed in touch for updates and appreciate the time taken.
      I gave this shop both my cars back to back for work, the paint was terrible on my OG Kia Soul on the roof with rust and he brought it back to life, it looked great as the first day I brought it! The sun had destroyed my roof, hood, spoiler and fenders on my van (only being a 6 yrs. old car), I was heartbroken to see the condition it was in; but Tony and the team once again did an amazing job with my car!!!
      I now have a shop I can trust, will return if ever need again and will recommend from my experience to other!
      10 out of 10!!!

- reviewer: Cassius Casio
    date: a year ago
    rating: 5
    text: |
      We were searching for quotations to get some paint and body work done on my 12 year old Buick Regal GS. The car is not a popular car and the parts weren't readily available. Thankfully we found Tony at Second Generation Auto. He spoke to my wife first who was helping me gather quotes. Tony came across as honest, knowledgeable and respectful. I can't emphasize this enough. The work was done well at a great value. He made you feel like he loved my car as much as I do. He stayed communicative during the whole process, stuck to his price and when I picked up the car, I noticed a few little other areas that he fixed for me as a courtesy. I highly recommend Tony and Second Generation Auto for all of your paint and body needs.

      
  - reviewer: Aaron Diaz
    date: 3 months ago
    rating: 5
    text: |
      I am the classic tale of a paint and body guy with no time to work on my own stuff. As a result, my daily was in desperate need of an overall. My aunt borrowed my car and found this shop after speaking with several others in the area for a surprise Christmas gift. I couldn't be happier with the workmanship, documentation, and overall process.
      They did an overall refinish with proper trim removal, preparation, and post paint cut and buffing. The car looks better than when we bought it in 2014. I would be happy to recommend them to anyone in the area. Thank you all.
    services: Painting, Body & Trim

