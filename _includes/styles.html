<style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0D1B2A;
      --navy-mid:#112233;
      --chrome:  #C8D6E0;
      --white:   #F2F5F8;
      --red:     #CC2200;
      --red-dk:  #A81B00;
      --muted:   #7A8FA0;
      --border:  #1E3248; 
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.65;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── Typography ── */
    h1, h2, h3, h4 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 0.6rem;
    }

    /* ── Layout ── */
    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    section { padding: 5rem 0; }

    /* ── Chrome Rule ── */
    .chrome-rule {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin: 0 0 3rem;
    }
    .chrome-rule::before,
    .chrome-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--chrome), transparent);
      .contact-grid { grid-template-columns: 1fr; gap: 3rem; }
      .form-row { grid-template-columns: 1fr; }
    }

    /* ── SERVICE AREAS STRIP ── */
    .areas {
      background: var(--navy);
      padding: 4rem 0;
      border-top: 1px solid var(--border);
    }
    .areas h2 { font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--chrome); margin-bottom: 2rem; text-align: center; }
    .areas-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    .area-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 1rem;
      border-radius: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .area-tag:hover { color: var(--chrome); border-color: var(--chrome); }
    .area-tag a { color: inherit; }

    /* ── FOOTER ── */
    .footer {
      background: #070F18;
      border-top: 1px solid var(--border);
      padding: 3rem 0 2rem;
    }
    .footer-inner {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 2rem;
      align-items: start;
      margin-bottom: 2.5rem;
    }
    .footer-logo img { height: 64px; }
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 2.5rem;
      list-style: none;
    }
    .footer-links a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--white); }
    .footer-contact-col {
      text-align: right;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.8;
    }
    .footer-contact-col a { color: var(--muted); }
    .footer-contact-col a:hover { color: var(--white); }
    .footer-bottom {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    @media (max-width: 768px) {
      .footer-inner { grid-template-columns: 1fr; }
      .footer-contact-col { text-align: left; }
      .footer-bottom { flex-direction: column; }
    }

    /* ── Scroll fade-in ── */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
    @media (prefers-reduced-motion: reduce) {
      .fade-in { opacity: 1; transform: none; transition: none; }
    }
  </style>
