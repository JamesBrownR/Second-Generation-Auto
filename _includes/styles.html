<style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0D1B2A;
      --navy-mid:#112233;
      --chrome:  #C8D6E0;
      --white:   #F2F5F8;
      --red:     #CC2200;
      --red-dk:  #A81B00;
      --muted:   #7A8FA0;
      --border:  #1E3248;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.65;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── Typography ── */
    h1, h2, h3, h4 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 0.6rem;
    }

    /* ── Layout ── */
    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    section { padding: 5rem 0; }

    /* ── Chrome Rule ── */
    .chrome-rule {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin: 0 0 3rem;
    }
    .chrome-rule::before,
    .chrome-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--chrome), transparent);
    }
    .chrome-rule span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--chrome);
      opacity: 0.5;
      white-space: nowrap;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(13, 27, 42, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .nav-logo img {
      height: 48px;
      width: auto;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.8rem;
      list-style: none;
    }
    .nav-links a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--chrome);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-cta {
      background: var(--red);
      color: var(--white) !important;
      padding: 0.45rem 1.1rem;
      border-radius: 3px;
      transition: background 0.2s !important;
    }
    .nav-cta:hover { background: var(--red-dk) !important; color: var(--white) !important; }


  </style>
