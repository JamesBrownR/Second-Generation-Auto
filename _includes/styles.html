<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:     #0D1B2A;
    --navy-mid: #112233;
    --chrome:   #C8D6E0;
    --white:    #F2F5F8;
    --red:      #CC2200;
    --red-dk:   #A81B00;
    --muted:    #7A8FA0;
    --border:   #1E3248;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    line-height: 1.65;
  }

  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }

  /* ── Typography ── */
  h1, h2, h3, h4 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 0.6rem;
    display: block;
  }

  /* ── Layout ── */
  .container {
    max-width: 1160px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  section { padding: 5rem 0; }

  /* ── Chrome Rule ── */
  .chrome-rule {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin: 0 0 3rem;
  }
  .chrome-rule::before,
  .chrome-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--chrome), transparent);
  }
  .chrome-rule span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--chrome);
    opacity: 0.5;
    white-space: nowrap;
  }

  /* ── PAGE HEADER (shared across About, Services, Reviews, Contact, Service Areas) ── */
  .page-header {
    padding: 9rem 0 4rem;
    background:
      linear-gradient(165deg, rgba(13,27,42,0.92) 40%, rgba(13,27,42,0.78) 100%),
      radial-gradient(ellipse at 70% 50%, #1a3a5c 0%, #0D1B2A 70%);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -20deg,
      transparent,
      transparent 120px,
      rgba(200,214,224,0.018) 120px,
      rgba(200,214,224,0.018) 122px
    );
    pointer-events: none;
  }
  .page-header .container { position: relative; z-index: 2; }
  .page-header h1 {
    font-size: clamp(2.4rem, 5vw, 4rem);
    color: var(--white);
    margin-bottom: 0.5rem;
  }
  .page-header h1 span {
    color: var(--chrome);
    display: block;
  }
  .page-header p {
    font-size: 1.05rem;
    color: var(--muted);
    max-width: 560px;
    margin-top: 1rem;
    line-height: 1.7;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.75rem 1.8rem;
    border-radius: 3px;
    cursor: pointer;
    border: none;
    transition: background 0.2s, transform 0.15s;
    text-decoration: none;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--red); color: var(--white); }
  .btn-primary:hover { background: var(--red-dk); color: var(--white); }
  .btn-outline {
    background: transparent;
    color: var(--chrome);
    border: 1px solid var(--chrome);
  }
  .btn-outline:hover { background: rgba(200,214,224,0.08); }

  /* ── NAV ── */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(13,27,42,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    max-width: 1160px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }
  .nav-logo { display: flex; align-items: center; }
  .nav-logo img { height: 48px; width: auto; }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 1.8rem;
    list-style: none;
  }
  .nav-links a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--chrome);
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-cta {
    background: var(--red);
    color: var(--white) !important;
    padding: 0.45rem 1.1rem;
    border-radius: 3px;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--red-dk) !important; }
  .nav-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }
  .nav-toggle span {
    display: block;
    width: 26px;
    height: 2px;
    background: var(--chrome);
    border-radius: 2px;
    transition: transform 0.3s, opacity 0.3s;
  }

  @media (max-width: 768px) {
    .nav-toggle { display: flex; }
    .nav-links {
      display: none;
      position: absolute;
      top: 68px; left: 0; right: 0;
      flex-direction: column;
      background: var(--navy-mid);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 1.5rem 2rem;
      gap: 1.2rem;
      align-items: flex-start;
    }
    .nav-open .nav-links { display: flex; }
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
    padding-top: 68px;
    background:
      linear-gradient(165deg, rgba(13,27,42,0.88) 40%, rgba(13,27,42,0.72) 100%),
      radial-gradient(ellipse at 70% 50%, #1a3a5c 0%, #0D1B2A 70%);
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -20deg,
      transparent,
      transparent 120px,
      rgba(200,214,224,0.018) 120px,
      rgba(200,214,224,0.018) 122px
    );
    pointer-events: none;
  }
  .hero-inner {
    position: relative;
    z-index: 2;
    max-width: 1160px;
    margin: 0 auto;
    padding: 5rem 1.5rem 4rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 3rem;
    align-items: center;
  }
  .hero-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 1rem;
    display: block;
  }
  .hero h1 {
    font-size: clamp(2.8rem, 6vw, 5rem);
    color: var(--white);
    margin-bottom: 0.3rem;
  }
  .hero h1 span { color: var(--chrome); display: block; }
  .hero-sub {
    font-size: 1.08rem;
    color: var(--muted);
    margin: 1.4rem 0 2.2rem;
    max-width: 480px;
  }
  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
  }
  .hero-phone {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 0.04em;
    margin-top: 2rem;
  }
  .hero-phone svg { color: var(--red); flex-shrink: 0; }
  .hero-phone a { color: inherit; }
  .hero-phone a:hover { color: var(--chrome); }
  .hero-logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero-logo-wrap img {
    width: clamp(220px, 28vw, 380px);
    filter: drop-shadow(0 8px 40px rgba(0,0,0,0.6));
  }
  .hero-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem;
    margin-top: 2.5rem;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .badge svg { color: var(--red); flex-shrink: 0; }

  @media (max-width: 768px) {
    .hero-inner { grid-template-columns: 1fr; text-align: center; }
    .hero-logo-wrap { order: -1; }
    .hero-logo-wrap img { width: 200px; }
    .hero-actions { justify-content: center; }
    .hero-badges { justify-content: center; }
    .hero-phone { justify-content: center; }
    .hero-sub { margin-left: auto; margin-right: auto; }
  }

  /* ── INTRO STRIP ── */
  .intro-strip {
    background: var(--navy-mid);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 3rem 0;
  }
  .intro-strip .container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
  }
  .intro-stat {
    text-align: center;
    padding: 1rem;
    border-right: 1px solid var(--border);
  }
  .intro-stat:last-child { border-right: none; }
  .intro-stat .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 3rem;
    font-weight: 800;
    color: var(--chrome);
    line-height: 1;
  }
  .intro-stat .num span { color: var(--red); }
  .intro-stat p { font-size: 0.9rem; color: var(--muted); margin-top: 0.3rem; }

  @media (max-width: 600px) {
    .intro-strip .container { grid-template-columns: 1fr; }
    .intro-stat { border-right: none; border-bottom: 1px solid var(--border); }
    .intro-stat:last-child { border-bottom: none; }
  }

  /* ── SERVICES (homepage) ── */
  .services-section { background: var(--navy); }
  .services-section h2 { font-size: clamp(2rem, 4vw, 3rem); color: var(--chrome); margin-bottom: 0.5rem; }
  .services-intro { color: var(--muted); max-width: 580px; margin-bottom: 3rem; }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1.5rem;
  }
  .service-card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem 1.8rem;
    transition: border-color 0.2s, transform 0.2s;
  }
  .service-card:hover { border-color: var(--red); transform: translateY(-3px); }
  .service-card svg { color: var(--red); margin-bottom: 1rem; }
  .service-card h3 { font-size: 1.3rem; color: var(--chrome); margin-bottom: 0.6rem; }
  .service-card p { font-size: 0.92rem; color: var(--muted); line-height: 1.6; }
  .service-link {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 1rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red);
    transition: gap 0.2s;
  }
  .service-card:hover .service-link { gap: 0.6rem; }

  /* ── GALLERY ── */
  .gallery { background: var(--navy-mid); }
  .gallery h2 { font-size: clamp(2rem, 4vw, 3rem); color: var(--chrome); margin-bottom: 0.5rem; }
  .gallery-intro { color: var(--muted); max-width: 560px; margin-bottom: 3rem; }

  .gallery-slider-wrap { position: relative; }
  .gallery-slider {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    scroll-behavior: smooth;
    scrollbar-width: none;
    padding-bottom: 0.5rem;
  }
  .gallery-slider::-webkit-scrollbar { display: none; }
  .gallery-slide {
    position: relative;
    flex: 0 0 320px;
    aspect-ratio: 4/3;
    overflow: hidden;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--border);
  }
  .gallery-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }
  .gallery-slide:hover img { transform: scale(1.04); }
  .gallery-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0.6rem 0.9rem;
    background: linear-gradient(transparent, rgba(13,27,42,0.92));
    font-size: 0.82rem;
    color: var(--chrome);
    transform: translateY(100%);
    transition: transform 0.3s;
  }
  .gallery-slide:hover .gallery-caption { transform: translateY(0); }
  .slider-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(13,27,42,0.85);
    border: 1px solid var(--border);
    color: var(--chrome);
    font-size: 1.2rem;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 2;
  }
  .slider-btn:hover { background: var(--red); }
  .slider-prev { left: -16px; }
  .slider-next { right: -16px; }

  /* ── REVIEWS ── */
  .reviews { background: var(--navy); }
  .reviews-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 3rem;
  }
  .reviews-header h2 { font-size: clamp(2rem, 4vw, 3rem); color: var(--chrome); }
  .reviews-header a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .reviews-header a:hover { color: var(--white); }

  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }
  .review-card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.8rem;
  }
  .stars { display: flex; gap: 2px; margin-bottom: 1rem; }
  .stars svg { color: #F5A623; }
  .review-text {
    font-size: 0.93rem;
    color: var(--white);
    line-height: 1.65;
    font-style: italic;
    margin-bottom: 1.2rem;
  }
  .review-text::before { content: '\201C'; }
  .review-text::after  { content: '\201D'; }
  .review-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .reviewer-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--chrome);
    letter-spacing: 0.05em;
  }
  .review-source {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .review-all-link { text-align: center; margin-top: 3rem; }

  /* ── CONTACT (homepage) ── */
  .contact { background: var(--navy-mid); }
  .contact h2 { font-size: clamp(2rem, 4vw, 3rem); color: var(--chrome); margin-bottom: 0.5rem; }
  .contact-intro { color: var(--muted); max-width: 480px; margin-bottom: 3rem; }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
  }
  .contact-info { display: flex; flex-direction: column; gap: 2rem; }
  .contact-item { display: flex; gap: 1rem; align-items: flex-start; }
  .contact-item svg { color: var(--red); flex-shrink: 0; margin-top: 2px; }
  .contact-item-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.2rem;
  }
  .contact-item-val { font-size: 1rem; color: var(--white); }
  .contact-item-val a { color: var(--white); }
  .contact-item-val a:hover { color: var(--chrome); }

  .social-links { display: flex; gap: 1rem; margin-top: 0.5rem; }
  .social-link {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.4rem 0.9rem;
    border-radius: 3px;
    transition: color 0.2s, border-color 0.2s;
  }
  .social-link:hover { color: var(--chrome); border-color: var(--chrome); }

  /* Shared form styles */
  .contact-form { display: flex; flex-direction: column; gap: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-field { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-field label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .form-field input,
  .form-field textarea,
  .form-field select {
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    padding: 0.7rem 1rem;
    transition: border-color 0.2s;
    outline: none;
    width: 100%;
  }
  .form-field input:focus,
  .form-field textarea:focus,
  .form-field select:focus { border-color: var(--chrome); }
  .form-field textarea { resize: vertical; min-height: 110px; }
  .form-field select option { background: var(--navy); }
  .form-note { font-size: 0.78rem; color: var(--muted); }

  @media (max-width: 860px) {
    .contact-grid { grid-template-columns: 1fr; gap: 3rem; }
    .form-row { grid-template-columns: 1fr; }
  }

  /* ── SERVICE AREAS STRIP (homepage) ── */
  .areas {
    background: var(--navy);
    padding: 4rem 0;
    border-top: 1px solid var(--border);
  }
  .areas h2 {
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    color: var(--chrome);
    margin-bottom: 2rem;
    text-align: center;
  }
  .areas-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: center;
  }
  .area-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 1rem;
    border-radius: 2px;
    transition: color 0.2s, border-color 0.2s;
    display: inline-block;
  }
  .area-tag:hover { color: var(--chrome); border-color: var(--chrome); }

  /* ── FOOTER ── */
  .footer {
    background: #070F18;
    border-top: 1px solid var(--border);
    padding: 3rem 0 2rem;
  }
  .footer-inner {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 2rem;
    align-items: start;
    margin-bottom: 2.5rem;
  }
  .footer-logo img { height: 64px; }
  .footer-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 2.5rem;
    list-style: none;
  }
  .footer-links a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--white); }
  .footer-contact-col {
    text-align: right;
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.8;
  }
  .footer-contact-col a { color: var(--muted); }
  .footer-contact-col a:hover { color: var(--white); }
  .footer-bottom {
    border-top: 1px solid var(--border);
    padding-top: 1.5rem;
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  @media (max-width: 768px) {
    .footer-inner { grid-template-columns: 1fr; }
    .footer-contact-col { text-align: left; }
    .footer-bottom { flex-direction: column; }
  }

  /* ── Scroll fade-in ── */
  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }
  @media (prefers-reduced-motion: reduce) {
    .fade-in { opacity: 1; transform: none; transition: none; }
  }
</style>
